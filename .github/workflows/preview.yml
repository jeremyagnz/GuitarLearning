# GitHub Actions workflow: build Expo web app and deploy a Netlify Preview
# Triggers on pull requests targeting the main branch.

name: Netlify Preview

on:
  pull_request:
    branches:
      - main

jobs:
  preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build web export
        run: npm run build:web

      - name: Deploy preview to Netlify
        id: netlify_preview
        run: |
          OUTPUT=$(npx netlify-cli deploy --dir=dist --json \
            --site "$NETLIFY_SITE_ID" \
            --auth "$NETLIFY_AUTH_TOKEN")
          echo "deploy_output=$OUTPUT" >> "$GITHUB_OUTPUT"
          PREVIEW_URL=$(echo "$OUTPUT" | jq -r '.deploy_url')
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.netlify_preview.outputs.preview_url }}';
            const body = `## 🔍 Netlify Preview\n\nYour preview is ready! 🚀\n\n| | |\n|---|---|\n| **Preview URL** | ${previewUrl} |\n| **Commit** | ${context.sha} |`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existingComment = comments.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('Netlify Preview')
            );

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
